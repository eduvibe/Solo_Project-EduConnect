<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/tutoreg.css"> 

    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body>
<div class="min-h-screen bg-[var(--maincolor)] py-10 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow p-6">
        <div class="text-center">
            <h1 class="text-3xl font-bold mb-2">Become a Tutor</h1>
            <p class="text-sm text-gray-600 mb-6">Create your tutor profile in a few steps.</p>
        </div>

        <div class="flex items-center justify-between text-xs font-semibold text-gray-600 mb-6">
            <div id="stepLabel">Step 1 of 6</div>
            <div class="flex gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-gray-300" data-step-dot="0"></span>
                <span class="w-2.5 h-2.5 rounded-full bg-gray-300" data-step-dot="1"></span>
                <span class="w-2.5 h-2.5 rounded-full bg-gray-300" data-step-dot="2"></span>
                <span class="w-2.5 h-2.5 rounded-full bg-gray-300" data-step-dot="3"></span>
                <span class="w-2.5 h-2.5 rounded-full bg-gray-300" data-step-dot="4"></span>
                <span class="w-2.5 h-2.5 rounded-full bg-gray-300" data-step-dot="5"></span>
            </div>
        </div>

        <form id="tutorRegistrationForm" action="submit.php" method="post" enctype="multipart/form-data">
            <div class="section" id="section1">
                <div class="space-y-4">
                    <div>
                        <label for="fullName" class="block text-sm font-semibold">Full Name <span class="text-red-600">*</span></label>
                        <input type="text" id="fullName" name="fullName" required class="w-full border border-black rounded-none p-2">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-semibold">Email Address <span class="text-red-600">*</span></label>
                        <input type="email" id="email" name="email" required class="w-full border border-black rounded-none p-2" placeholder="name@email.com">
                    </div>
                    <div>
                        <label for="phone" class="block text-sm font-semibold">Phone Number <span class="text-red-600">*</span></label>
                        <input type="tel" id="phone" name="phone" required class="w-full border border-black rounded-none p-2">
                    </div>
                    <div>
                        <label for="photo" class="block text-sm font-semibold">Photo <span class="text-red-600">*</span></label>
                        <input type="file" id="photo" name="photo" accept="image/*" required class="w-full border border-black rounded-none p-2 bg-white">
                    </div>
                </div>
                <div class="mt-6 flex justify-end">
                    <button type="button" class="next-section bg-blue-600 text-white px-5 py-2">Next</button>
                </div>
            </div>

            <div class="section hidden" id="section2">
                <div class="space-y-4">
                    <div>
                        <label for="teachingSubjects" class="block text-sm font-semibold">Teaching Subjects <span class="text-red-600">*</span></label>
                        <select id="teachingSubjects" name="teachingSubjects" required class="w-full border border-black rounded-none p-2 bg-white">
                            <option value="">Select Teaching Subjects</option>
                            <optgroup label="Secondary School Subjects">
                                <option value="Mathematics">Mathematics</option>
                                <option value="English Language">English Language</option>
                                <option value="Physics">Physics</option>
                                <option value="Chemistry">Chemistry</option>
                                <option value="Biology">Biology</option>
                                <option value="Economics">Economics</option>
                                <option value="Lit-in-English">Lit-in-English</option>
                                <option value="Government">Government</option>
                                <option value="Technical Drawing">Technical Drawing</option>
                                <option value="Basic STechnology">Basic Science & Technology</option>
                            </optgroup>
                            <optgroup label="Primary School Subjects">
                                <option value="Basic Mathematics">Basic Mathematics</option>
                                <option value="Literacy">Literacy</option>
                                <option value="Science">Science</option>
                                <option value="Social Studies">Social Studies</option>
                            </optgroup>
                        </select>
                    </div>
                </div>
                <div class="mt-6 flex justify-between">
                    <button type="button" class="prev-section border border-black px-5 py-2">Previous</button>
                    <button type="button" class="next-section bg-blue-600 text-white px-5 py-2">Next</button>
                </div>
            </div>

            <div class="section hidden" id="section3">
                <div class="space-y-4">
                    <div>
                        <label for="educationLevel" class="block text-sm font-semibold">Highest Education Level <span class="text-red-600">*</span></label>
                        <select id="educationLevel" name="educationLevel" required class="w-full border border-black rounded-none p-2 bg-white">
                            <option value="">Select Education Level</option>
                            <option value="High School">High School</option>
                            <option value="Bachelor's Degree">Bachelor's Degree</option>
                            <option value="Master's Degree">Master's Degree</option>
                            <option value="PhD">PhD</option>
                        </select>
                    </div>
                    <div>
                        <label for="educationField" class="block text-sm font-semibold">Field of Study <span class="text-red-600">*</span></label>
                        <input type="text" id="educationField" name="educationField" required class="w-full border border-black rounded-none p-2">
                    </div>
                    <div>
                        <label for="certification" class="block text-sm font-semibold">Certification (if any)</label>
                        <input type="file" id="certification" name="certification" accept=".pdf,.doc,.docx" class="w-full border border-black rounded-none p-2 bg-white">
                    </div>
                </div>
                <div class="mt-6 flex justify-between">
                    <button type="button" class="prev-section border border-black px-5 py-2">Previous</button>
                    <button type="button" class="next-section bg-blue-600 text-white px-5 py-2">Next</button>
                </div>
            </div>

            <div class="section hidden" id="section4">
                <div class="space-y-4">
                    <div>
                        <label for="about" class="block text-sm font-semibold">Description <span class="text-red-600">*</span></label>
                        <textarea id="about" name="about" rows="4" required class="w-full border border-black rounded-none p-2" placeholder="Describe yourself as a tutor"></textarea>
                    </div>
                </div>
                <div class="mt-6 flex justify-between">
                    <button type="button" class="prev-section border border-black px-5 py-2">Previous</button>
                    <button type="button" class="next-section bg-blue-600 text-white px-5 py-2">Next</button>
                </div>
            </div>

            <div class="section hidden" id="section5">
                <div class="space-y-4">
                    <div>
                        <label for="videoLink" class="block text-sm font-semibold">Video Link</label>
                        <input type="url" id="videoLink" name="videoLink" class="w-full border border-black rounded-none p-2" placeholder="https://...">
                    </div>
                </div>
                <div class="mt-6 flex justify-between">
                    <button type="button" class="prev-section border border-black px-5 py-2">Previous</button>
                    <button type="button" class="next-section bg-blue-600 text-white px-5 py-2">Next</button>
                </div>
            </div>

            <div class="section hidden" id="section6">
                <div class="space-y-4">
                    <div>
                        <label for="availability" class="block text-sm font-semibold">Availability <span class="text-red-600">*</span></label>
                        <select id="availability" name="availability" required class="w-full border border-black rounded-none p-2 bg-white">
                            <option value="">Select Availability</option>
                            <option value="Anytime">Anytime</option>
                            <option value="Morning">Morning</option>
                            <option value="Afternoon">Afternoon</option>
                            <option value="Night">Night</option>
                        </select>
                    </div>
                    <div>
                        <label for="hourlyRate" class="block text-sm font-semibold">Hourly Rate (₦) <span class="text-red-600">*</span></label>
                        <input type="number" id="hourlyRate" name="hourlyRate" min="0" step="0.01" required class="w-full border border-black rounded-none p-2">
                    </div>
                    <div class="flex items-start gap-2">
                        <input type="checkbox" id="agreeTerms" name="agreeTerms" required class="mt-1">
                        <label for="agreeTerms" class="text-sm">I agree to the <a href="#" class="underline">Terms & Conditions</a></label>
                    </div>
                </div>
                <div class="mt-6 flex justify-between">
                    <button type="button" class="prev-section border border-black px-5 py-2">Previous</button>
                    <button type="submit" class="bg-blue-600 text-white px-5 py-2">Submit</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    (function () {
        var form = document.getElementById('tutorRegistrationForm');
        if (!form) return;

        var sections = Array.prototype.slice.call(form.querySelectorAll('.section'));
        if (!sections.length) return;

        var stepLabel = document.getElementById('stepLabel');
        var dots = Array.prototype.slice.call(document.querySelectorAll('[data-step-dot]'));
        var currentIndex = 0;

        function setInvalid(el, isInvalid) {
            if (!el) return;
            if (isInvalid) {
                el.classList.add('border-red-600');
            } else {
                el.classList.remove('border-red-600');
            }
        }

        function validateSection(sectionEl) {
            var fields = Array.prototype.slice.call(sectionEl.querySelectorAll('input, select, textarea'));
            var ok = true;

            fields.forEach(function (field) {
                if (!field.required) {
                    setInvalid(field, false);
                    return;
                }

                if (field.type === 'checkbox') {
                    var valid = field.checked;
                    ok = ok && valid;
                    return;
                }

                if (field.type === 'file') {
                    var hasFile = field.files && field.files.length > 0;
                    ok = ok && hasFile;
                    setInvalid(field, !hasFile);
                    return;
                }

                var value = (field.value || '').trim();
                var validText = value.length > 0;
                ok = ok && validText;
                setInvalid(field, !validText);
            });

            return ok;
        }

        function updateStepUI() {
            sections.forEach(function (s, idx) {
                if (idx === currentIndex) {
                    s.classList.remove('hidden');
                } else {
                    s.classList.add('hidden');
                }
            });

            if (stepLabel) {
                stepLabel.textContent = 'Step ' + (currentIndex + 1) + ' of ' + sections.length;
            }

            dots.forEach(function (dot, idx) {
                if (idx === currentIndex) {
                    dot.classList.remove('bg-gray-300');
                    dot.classList.add('bg-blue-600');
                } else {
                    dot.classList.add('bg-gray-300');
                    dot.classList.remove('bg-blue-600');
                }
            });
        }

        form.addEventListener('click', function (e) {
            var nextBtn = e.target.closest('.next-section');
            var prevBtn = e.target.closest('.prev-section');
            if (!nextBtn && !prevBtn) return;

            e.preventDefault();

            if (nextBtn) {
                var ok = validateSection(sections[currentIndex]);
                if (!ok) return;
                currentIndex = Math.min(currentIndex + 1, sections.length - 1);
                updateStepUI();
                return;
            }

            if (prevBtn) {
                currentIndex = Math.max(currentIndex - 1, 0);
                updateStepUI();
            }
        });

        updateStepUI();
    })();
</script>
    
</body>
</html>
